services:
  deepstream-tasks:
    build: .
    image: deepstream-tasks:8.0
    container_name: deepstream-tasks-app
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=$DISPLAY
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./output:/app/output
      - ./input:/app/input
    tty: true
    stdin_open: true
    command: /bin/bash
